<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 90" width="190" height="90">
  <title>JSR - Jump to Subroutine</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <line x1="10" y1="50" x2="30" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="30" y="20" width="130" height="60" rx="5" fill="#e8e0f0" stroke="#6a4c93" stroke-width="2"/>
  <text x="95" y="38" fill="#6a4c93" font-size="12" font-weight="bold" text-anchor="middle" dominant-baseline="middle">JSR</text>
  <text x="95" y="54" fill="#555" font-size="9" text-anchor="middle" dominant-baseline="middle">Routine: SubName</text>
  <text x="95" y="68" fill="#555" font-size="9" text-anchor="middle" dominant-baseline="middle">Params: 3</text>
  <line x1="160" y1="50" x2="180" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

</svg>
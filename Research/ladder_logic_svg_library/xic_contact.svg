<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 95" width="180" height="95">
  <title>XIC - Examine If Closed</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Wire in -->
  <line x1="10" y1="50" x2="55" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wire out -->
  <line x1="125" y1="50" x2="170" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left vertical bar -->
  <line x1="55" y1="36" x2="55" y2="64" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right vertical bar -->
  <line x1="125" y1="36" x2="125" y2="64" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tag name -->
  <text x="90" y="26" fill="#333" font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="middle">TagName</text>
  <!-- Type label -->
  <text x="90" y="78" fill="#999" font-size="9" text-anchor="middle" dominant-baseline="middle">XIC</text>

</svg>
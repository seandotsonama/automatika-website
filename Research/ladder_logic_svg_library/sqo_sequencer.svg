<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 105" width="210" height="105">
  <title>SQO - Sequencer Output</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <line x1="10" y1="55" x2="25" y2="55" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="25" y="12" width="160" height="84" rx="5" fill="#f5f0ff" stroke="#6a4c93" stroke-width="2"/>
  <text x="105" y="28" fill="#6a4c93" font-size="12" font-weight="bold" text-anchor="middle" dominant-baseline="middle">SQO</text>
  <text x="105" y="42" fill="#555" font-size="8" text-anchor="middle" dominant-baseline="middle">Array: SeqData[0]</text>
  <text x="105" y="54" fill="#555" font-size="8" text-anchor="middle" dominant-baseline="middle">Mask: 00FFh</text>
  <text x="105" y="66" fill="#555" font-size="8" text-anchor="middle" dominant-baseline="middle">Dest: OutputWord</text>
  <text x="105" y="78" fill="#555" font-size="8" text-anchor="middle" dominant-baseline="middle">Control: SQ1  Len: 8</text>
  <text x="105" y="90" fill="#555" font-size="8" text-anchor="middle" dominant-baseline="middle">Pos: 0</text>
  <line x1="185" y1="55" x2="200" y2="55" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

</svg>
  <text x="90" y="34" fill="#6a7a8a" font-size="12" font-weight="bold" text-anchor="middle" dominant-baseline="middle">LEQ</text>
  <text x="90" y="50" fill="#666" font-size="9" text-anchor="middle" dominant-baseline="middle">Source A: Value</text>
  <text x="90" y="64" fill="#666" font-size="9" text-anchor="middle" dominant-baseline="middle">Source B: 50</text>
  <line x1="150" y1="50" x2="170" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

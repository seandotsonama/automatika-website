  <title>LEQ - Less or Equal</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <line x1="10" y1="50" x2="30" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

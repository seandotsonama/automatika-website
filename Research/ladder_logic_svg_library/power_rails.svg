<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 115" width="180" height="115">
  <title>Power Rails</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Left power rail -->
  <line x1="20" y1="10" x2="20" y2="90" stroke="#333" stroke-width="3"/>
  <text x="20" y="105" fill="#999" font-size="9" text-anchor="middle">Left Rail</text>
  <!-- Right power rail -->
  <line x1="160" y1="10" x2="160" y2="90" stroke="#333" stroke-width="3"/>
  <text x="160" y="105" fill="#999" font-size="9" text-anchor="middle">Right Rail</text>
  <!-- Horizontal rung wire -->
  <line x1="20" y1="50" x2="160" y2="50" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

</svg>
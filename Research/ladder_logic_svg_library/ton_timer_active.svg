<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" width="320" height="140">
  <title>TON - Timer Active (Timing)</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- Green background indicating power flow -->
  <rect x="0" y="0" width="320" height="140" rx="6" fill="#e6f9e6"/>

  <!-- Wire in (energized) -->
  <line x1="0" y1="30" x2="40" y2="30" stroke="#00cc44" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Main box (active highlight) -->
  <rect x="40" y="8" width="200" height="120" rx="0" fill="#d4f5d4" stroke="#006600" stroke-width="2"/>

  <!-- Title bar -->
  <line x1="40" y1="32" x2="240" y2="32" stroke="#006600" stroke-width="1.5"/>
  <text x="50" y="23" fill="#006600" font-size="13" font-weight="700">TON</text>
  <text x="110" y="23" fill="#006600" font-size="11" font-weight="400">Timer On Delay</text>

  <!-- Row: Timer -->
  <line x1="40" y1="58" x2="240" y2="58" stroke="#afa" stroke-width="0.5"/>
  <text x="50" y="48" fill="#006600" font-size="11" font-weight="500">Timer</text>
  <text x="230" y="48" fill="#006600" font-size="11" font-weight="500" text-anchor="end">TimerTag</text>

  <!-- Row: Preset -->
  <line x1="40" y1="84" x2="240" y2="84" stroke="#afa" stroke-width="0.5"/>
  <text x="50" y="74" fill="#006600" font-size="11" font-weight="500">Preset</text>
  <text x="200" y="74" fill="#006600" font-size="11" font-weight="500" text-anchor="end">5000</text>
  <polygon points="206,74 214,70 214,78" fill="#006600"/>

  <!-- Row: Accum (timing in progress) -->
  <text x="50" y="100" fill="#006600" font-size="11" font-weight="500">Accum</text>
  <text x="200" y="100" fill="#006600" font-size="11" font-weight="500" text-anchor="end">3000</text>
  <polygon points="206,100 214,96 214,104" fill="#006600"/>

  <!-- EN output pin (energized) -->
  <line x1="240" y1="30" x2="280" y2="30" stroke="#00cc44" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="23" fill="#006600" font-size="10" font-weight="500" text-anchor="middle">(EN)</text>

  <!-- DN output pin (not done yet) -->
  <line x1="240" y1="100" x2="280" y2="100" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="116" fill="#333" font-size="10" font-weight="500" text-anchor="middle">(DN)</text>

</svg>
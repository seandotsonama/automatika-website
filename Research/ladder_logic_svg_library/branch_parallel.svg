<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 130" width="350" height="130">
  <title>Branch - Parallel OR Logic (Seal-In)</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>
  
  <!-- Left rail segment -->
  <line x1="10" y1="10" x2="10" y2="120" stroke="#333" stroke-width="3"/>
  <!-- Right rail segment -->
  <line x1="340" y1="10" x2="340" y2="120" stroke="#333" stroke-width="3"/>

  <!-- Branch vertical connectors -->
  <line x1="20" y1="40" x2="20" y2="90" stroke="#00cc44" stroke-width="2"/>
  <line x1="180" y1="40" x2="180" y2="90" stroke="#555" stroke-width="2"/>

  <!-- Top branch wire -->
  <line x1="10" y1="40" x2="65" y2="40" stroke="#00cc44" stroke-width="2.5"/>
  <line x1="135" y1="40" x2="180" y2="40" stroke="#555" stroke-width="2.5"/>

  <!-- Bottom branch wire -->
  <line x1="20" y1="90" x2="65" y2="90" stroke="#00cc44" stroke-width="2.5"/>
  <line x1="135" y1="90" x2="180" y2="90" stroke="#555" stroke-width="2.5"/>

  <!-- Top contact (XIC Start) -->
  <line x1="65" y1="28" x2="65" y2="52" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="135" y1="28" x2="135" y2="52" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="22" fill="#333" font-size="10" font-weight="500" text-anchor="middle">Start</text>

  <!-- Bottom contact (XIC Running) -->
  <line x1="65" y1="78" x2="65" y2="102" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="135" y1="78" x2="135" y2="102" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="72" fill="#333" font-size="10" font-weight="500" text-anchor="middle">Running</text>

  <!-- Wire to output -->
  <line x1="180" y1="40" x2="240" y2="40" stroke="#555" stroke-width="2.5"/>

  <!-- XIO Stop -->
  <line x1="240" y1="28" x2="240" y2="52" stroke="#1a7a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="28" x2="280" y2="52" stroke="#1a7a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="240" y1="52" x2="280" y2="28" stroke="#1a7a1a" stroke-width="2" stroke-linecap="round"/>
  <text x="260" y="22" fill="#1a7a1a" font-size="10" font-weight="500" text-anchor="middle">Stop</text>

  <!-- Wire to OTE -->
  <line x1="280" y1="40" x2="295" y2="40" stroke="#555" stroke-width="2.5"/>

  <!-- OTE Motor coil -->
  <ellipse cx="315" cy="40" rx="18" ry="12" fill="#e8eef4" stroke="#2d5a7d" stroke-width="2"/>
  <text x="315" y="22" fill="#2d5a7d" font-size="10" font-weight="500" text-anchor="middle">Motor</text>

  <line x1="333" y1="40" x2="340" y2="40" stroke="#555" stroke-width="2.5"/>

  <!-- Label -->
  <text x="175" y="118" fill="#999" font-size="9" text-anchor="middle">Seal-In Circuit: (Start OR Running) AND NOT Stop = Motor</text>

</svg>
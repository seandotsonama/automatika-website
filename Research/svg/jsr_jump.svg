<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 185" width="390" height="185">
  <title>JSR - Jump to Subroutine</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <line x1="0" y1="34" x2="50" y2="34" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="50" y="10" width="260" height="150" rx="0" fill="#e8e0f0" stroke="#6a4c93" stroke-width="2"/>
  <line x1="50" y1="48" x2="310" y2="48" stroke="#6a4c93" stroke-width="1.5"/>
  <text x="62" y="34" fill="#6a4c93" font-size="18" font-weight="700">JSR</text>
  <text x="130" y="34" fill="#6a4c93" font-size="16" font-weight="400">Jump to Subroutine</text>
  <line x1="50" y1="90" x2="310" y2="90" stroke="#ccc" stroke-width="0.5"/>
  <text x="62" y="72" fill="#333" font-size="16" font-weight="500">Routine</text>
  <text x="298" y="72" fill="#333" font-size="16" font-weight="bold" text-anchor="end">Sub_Call</text>
  <text x="62" y="118" fill="#333" font-size="16" font-weight="500">Params</text>
  <text x="298" y="118" fill="#333" font-size="16" font-weight="500" text-anchor="end">3</text>
  <line x1="310" y1="34" x2="350" y2="34" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <text x="180" y="178" fill="#888" font-size="14" text-anchor="middle">U:3</text>

</svg>

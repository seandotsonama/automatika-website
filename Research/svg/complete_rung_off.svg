<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 90" width="450" height="90">
  <title>Complete Rung - Unenergized</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- Rails -->
  <line x1="10" y1="5" x2="10" y2="85" stroke="#333" stroke-width="3"/>
  <line x1="440" y1="5" x2="440" y2="85" stroke="#333" stroke-width="3"/>
  <line x1="10" y1="45" x2="50" y2="45" stroke="#555" stroke-width="2.5"/>
  <!-- XIC AutoMode -->
  <line x1="50" y1="33" x2="50" y2="57" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="33" x2="90" y2="57" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="70" y="25" fill="#333" font-size="9" font-weight="bold" text-anchor="middle">AutoMode</text>
  <line x1="90" y1="45" x2="130" y2="45" stroke="#555" stroke-width="2.5"/>
  <!-- GEQ comparison -->
  <rect x="130" y="22" width="110" height="46" rx="4" fill="#f0f4f8" stroke="#6a7a8a" stroke-width="2"/>
  <text x="185" y="37" fill="#333" font-size="10" font-weight="bold" text-anchor="middle" dominant-baseline="middle">GEQ</text>
  <text x="185" y="52" fill="#333" font-size="8" text-anchor="middle" dominant-baseline="middle">Temp >= 70</text>
  <line x1="240" y1="45" x2="330" y2="45" stroke="#555" stroke-width="2.5"/>
  <!-- OTE Fan (parentheses style) -->
  <path d="M 357.4,31 Q 328.6,45 357.4,59" fill="none" stroke="#6a7a8a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 382.6,31 Q 411.4,45 382.6,59" fill="none" stroke="#6a7a8a" stroke-width="2.5" stroke-linecap="round"/>
  <text x="370" y="18" fill="#333" font-size="10" font-weight="bold" text-anchor="middle">Fan</text>
  <line x1="406" y1="45" x2="440" y2="45" stroke="#555" stroke-width="2.5"/>
  <!-- Rung number -->
  <rect x="0" y="0" width="18" height="16" rx="3" fill="#4a6fa5"/>
  <text x="9" y="11" fill="white" font-size="8" font-weight="bold" text-anchor="middle">1</text>
  <text x="225" y="82" fill="#999" font-size="8" text-anchor="middle">XIC(AutoMode) GEQ(Temp,70) OTE(Fan)</text>

</svg>

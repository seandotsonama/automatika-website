<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <title>Power Rails - L1 / L2</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <line x1="20" y1="10" x2="20" y2="110" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="180" y1="10" x2="180" y2="110" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="20" y1="60" x2="50" y2="60" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="150" y1="60" x2="180" y2="60" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <text x="100" y="60" fill="#999" font-size="10" text-anchor="middle" dominant-baseline="middle">. . .</text>
  <text x="20" y="8" fill="#333" font-size="9" font-weight="bold" text-anchor="middle">L1</text>
  <text x="180" y="8" fill="#333" font-size="9" font-weight="bold" text-anchor="middle">L2</text>


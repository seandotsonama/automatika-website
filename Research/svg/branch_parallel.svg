<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 105" width="230" height="105">
  <title>Branch - Parallel (OR)</title>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- Main horizontal wire -->
  <line x1="10" y1="30" x2="220" y2="30" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branch down left -->
  <line x1="40" y1="30" x2="40" y2="70" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branch horizontal -->
  <line x1="40" y1="70" x2="190" y2="70" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branch up right -->
  <line x1="190" y1="70" x2="190" y2="30" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Upper path contact bars -->
  <line x1="80" y1="20" x2="80" y2="40" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="150" y1="20" x2="150" y2="40" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="115" y="16" fill="#333" font-size="9" font-weight="500" text-anchor="middle">Path_A</text>
  <!-- Lower path contact bars -->
  <line x1="80" y1="60" x2="80" y2="80" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="150" y1="60" x2="150" y2="80" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="115" y="56" fill="#333" font-size="9" font-weight="500" text-anchor="middle">Path_B</text>
  <text x="115" y="96" fill="#999" font-size="9" text-anchor="middle">Parallel Branch (OR)</text>

</svg>
